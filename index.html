<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Giảm Giá</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 350px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        button:active {
            transform: scale(0.98);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .result.show {
            display: block;
            animation: slideDown 0.3s ease-in-out;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result p {
            margin: 10px 0;
            color: #333;
            font-size: 14px;
        }
        .result strong {
            color: #667eea;
            font-size: 16px;
        }
        .result-line {
            text-align: left;
            padding: 6px 0;
            border-bottom: 1px dashed #ddd;
            color: #333;
        }
        .result-line:last-child {
            border-bottom: none;
        }
        .final-price {
            color: #28a745;
            font-size: 18px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
        }
        .final-price strong {
            color: #28a745;
            font-size: 20px;
        }
        
        /* Responsive Mobile */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
                border-radius: 8px;
            }
            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }
            input, select {
                padding: 10px;
                font-size: 16px;
            }
            button {
                padding: 12px;
                font-size: 14px;
            }
            .result {
                padding: 15px;
            }
            .result p {
                font-size: 13px;
            }
            .result strong {
                font-size: 15px;
            }
            .final-price {
                font-size: 16px;
            }
            .final-price strong {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Máy Tính Giảm Giá</h1>
        <div class="input-group">
            <label>Nhập số tiền:</label>
            <input type="text" id="amount" placeholder="VD: 50, 100, 200">
        </div>
        <div class="input-group">
            <label>Chọn % giảm giá:</label>
            <select id="discount">
                <option value="25">Giảm 25%</option>
                <option value="30">Giảm 30%</option>
                <option value="40">Giảm 40%</option>
                <option value="50">Giảm 50%</option>
            </select>
        </div>
        <button onclick="calculateDiscount()">Tính Toán</button>
        <div class="result" id="result">
            <div id="resultLines"></div>
        </div>
    </div>

    <script>
        function calculateDiscount() {
            const rawInput = document.getElementById('amount').value;
            const discountPercent = parseFloat(document.getElementById('discount').value);
            const amounts = rawInput
                .split(',')
                .map(value => value.trim())
                .filter(Boolean)
                .map(value => Number(value));
            
            if (rawInput.trim() === '' || amounts.length === 0 || amounts.some(amount => isNaN(amount) || amount < 0)) {
                alert('Vui lòng nhập ít nhất một số tiền hợp lệ, cách nhau bằng dấu phẩy!');
                return;
            }
            
            const lines = amounts.map(amount => {
                const discountAmount = amount * (discountPercent / 100);
                const finalPrice = amount - discountAmount;
                return `<p class="result-line">• ${amount.toLocaleString('vi-VN')} → ${finalPrice.toLocaleString('vi-VN')}</p>`;
            });
            
            document.getElementById('amount').value = '';
            document.getElementById('amount').focus();
            document.getElementById('resultLines').innerHTML = lines.join('');
            document.getElementById('result').classList.add('show');
        }

        // Enter key support
        document.getElementById('amount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateDiscount();
        });
    </script>
</body>
</html>
